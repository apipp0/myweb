<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background-color: aliceblue;
        }
        nav{
            background-color: white;
            border-bottom: 1px solid black;
            border-radius: 0 0 2rem 2rem;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            box-shadow: 5px 5px black;
        }
        nav ul{
            list-style: none;
            display: flex;
            gap: 1rem;
            margin: 2rem;
        }
        nav ul li a{
            text-decoration: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-bottom: 1px solid rgba(255, 68, 0, 0);
            font-weight: 600;
            color: black;
            transition: all;
            transition-duration: 600ms;
        }
        nav ul li a:hover{
            border-bottom: 1px solid orangered;
            color: orangered;
        }
        nav .profile img{
            width: 4rem;
            margin: 1rem;
            transition: all;
            transition-duration: 600ms;
        }
        nav .profile img:hover{
            width: 5rem;
        }
        main {
            display: flex;
            padding: 2rem;
            justify-content: space-between;
            position: fixed;
            height: 85%;
            width: 100%;
        }
        main .profile{
            background-color: white;
            border: 1px solid black;
            width: 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            gap: 1rem;
            border-radius: 2rem;
            box-shadow: 5px 5px black;
        }
        main .profile .deskripsi {
            border-top: 1px solid black;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            padding-top: 2rem;
        }
        main .profile .deskripsi .deskripsi-text{
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        main .profile .deskripsi .deskripsi-text a{
            text-decoration: none;
            color: black;

        }
        main .profile .deskripsi .logo {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        main .profile .deskripsi a{
            font-size: 14px;
        }
        main .profile .medsos{
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            width: 100%;
            padding-top: 3rem;
        }
        main .profile img{
            height: 7rem;
            width: 7rem;
            background-color: aliceblue;
            border: 1px solid black;
            border-radius: 50%;
            
        }
        main .profile .profile-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        main .profile .profile-text a{
            text-decoration: none;
            color: black;
            font-weight: 900;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
        }
        main .profile .profile-text p{
            font-size: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        main .biodata {
            background-color: black;
            width: 65%;
        }
        @media only screen and (max-width : 768px){
            nav{
                flex-direction: column;
            }
            nav ul{
                flex-direction: column;
                align-items: center;
            }
            .hide {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="profile" id="button-hide">
            <img src="me.png" alt="">
        </div>
        <ul class="hide" id="class-hide">
            <li>
                <a href="#">Dashboard</a>
            </li>
            <li>
                <a href="#">Produk</a>
            </li>
            <li>
                <a href="#">Adress</a>
            </li>
            <li>
                <a href="#">Contact</a>
            </li>
        </ul>
    </nav>
    <main>
        <div class="profile">
            <img src="me.png" alt="">
            <div class="profile-text">
                <a href="#">Apip PO</a>
                <p>Web Programming</p>
            </div>
            <div class="deskripsi">
                <div class="logo">
                    <a href="#">logo</a>
                    <a href="#">logo</a>
                    <a href="#">logo</a>
                    <a href="#">logo</a>
                    <a href="#">logo</a>
                    <a href="#">logo</a>
                </div>
                <div class="deskripsi-text">
                    <a href="#">galihabdigusti29@gmail.com</a>
                    <a href="#">083166767723</a>
                    <a href="#">Indonesia</a>
                    <a href="#">29 April 2008</a>
                    <a href="#">Apippo.dev</a>
                    <a href="#">github.com/apipp0</a>
                </div>
            </div>
            <div class="medsos">
                <a href="#">ig</a>
                <a href="#">ig</a>
                <a href="#">ig</a>
                <a href="#">ig</a>
            </div>
        </div>
        <div class="biodata">anjayy</div>
    </main>
</body>
<script>
    const buttonHide = document.getElementById('button-hide');
    const classHide = document.getElementById('class-hide');
    buttonHide.addEventListener('click', function (e) {
        classHide.classList.toggle('hide');
    });
</script>
</html>
