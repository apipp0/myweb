<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,*{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            background-color: aliceblue;
        }
        nav{
            background-color: white;
            border-bottom: 1px solid black;
            border-radius: 0 0 2rem 2rem;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            box-shadow: 5px 5px black;
        }
        nav ul{
            list-style: none;
            display: flex;
            gap: 1rem;
            margin: 2rem;
        }
        nav ul li a{
            text-decoration: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-bottom: 1px solid rgba(255, 68, 0, 0);
            font-weight: 600;
            color: black;
            transition: all;
            transition-duration: 600ms;
        }
        nav ul li a:hover{
            border-bottom: 1px solid orangered;
            color: orangered;
        }
        nav .profile img{
            width: 4rem;
            margin: 1rem;
            transition: all;
            transition-duration: 600ms;
        }
        nav .profile img:hover{
            width: 5rem;
        }
        @media only screen and (max-width : 768px){
            nav{
                flex-direction: column;
            }
            nav ul{
                flex-direction: column;
                align-items: center;
            }
            .hide {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="profile" id="button-hide">
            <img src="me.png" alt="">
        </div>
        <ul class="hide" id="class-hide">
            <li>
                <a href="#">Dashboard</a>
            </li>
            <li>
                <a href="#">Produk</a>
            </li>
            <li>
                <a href="#">Adress</a>
            </li>
            <li>
                <a href="#">Contact</a>
            </li>
        </ul>
    </nav>
</body>
<script>
    const buttonHide = document.getElementById('button-hide');
    const classHide = document.getElementById('class-hide');
    buttonHide.addEventListener('click', function (e) {
        classHide.classList.toggle('hide');
    });
</script>
</html>
